name: Compute next simple version
description: Computes the next immutable v<major> tag.

outputs:
  next_tag:
    description: Next simple version tag (e.g. v2)
    value: ${{ steps.compute.outputs.next_tag }}

runs:
  using: "composite"
  steps:
    - name: Compute next simple version from existing tags
      id: compute
      shell: bash
      run: |
        set -euo pipefail

        simple_tags="$(git tag -l | grep -E '^v[1-9][0-9]*$' || true)"

        if [ -z "${simple_tags}" ]; then
          next_tag="v1"
        else
          latest_tag="$(printf "%s\n" "${simple_tags}" | sort -V | tail -n1)"
          next_major=$(("${latest_tag#v}" + 1))
          next_tag="v${next_major}"
        fi

        echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
