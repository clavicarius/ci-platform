name: Compute next semantic version
description: Computes the next v<major>.<minor>.<patch> tag.

outputs:
  next_tag:
    description: Next semantic version tag (e.g. v0.1.1)
    value: ${{ steps.compute.outputs.next_tag }}

runs:
  using: "composite"
  steps:
    - name: Compute next semantic version from existing tags
      id: compute
      shell: bash
      run: |
        set -euo pipefail

        semver_tags="$(
          git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true
        )"

        if [ -z "${semver_tags}" ]; then
          next_tag="v0.1.0"
        else
          latest_tag="$(printf "%s\n" "${semver_tags}" | sort -V | tail -n1)"
          version="${latest_tag#v}"

          IFS='.' read -r major minor patch <<< "${version}"
          patch=$((patch + 1))

          next_tag="v${major}.${minor}.${patch}"
        fi

        echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
