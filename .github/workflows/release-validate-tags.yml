name: release-validate-tags

on:
  workflow_call:
    inputs:
      tag:
        description: >
          Tag to validate (e.g. v3). When empty, the tag is derived from
          github.ref (used when triggered via push).
        required: false
        type: string
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write

jobs:
  validate-tag:
    name: Validate version tag
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate format and monotonicity
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail

          echo "Validating tag: $TAG"

          # Format check: ^v[1-9][0-9]*$
          if ! echo "$TAG" | grep -qE '^v[1-9][0-9]*$'; then
            echo "::error::Tag '$TAG' does not match expected format" \
              "^v[1-9][0-9]*$"
            gh issue create \
              --title "Invalid version tag: $TAG" \
              --body "Der Tag \`$TAG\` ist ungültig.

          Erwartetes Format: \`^v[1-9][0-9]*\$\` (z. B. v1, v2, v10).
          Keine führenden Nullen, erste Version ist v1.

          Bitte erstelle ein neues Tag mit korrektem Format.

          @clavicarius"
            exit 1
          fi

          # Fetch all tags (checkout already did fetch-depth: 0, but ensure)
          git fetch --tags --prune

          # Find highest existing valid vN tag, excluding the current one
          MAX=0
          while IFS= read -r t; do
            n="${t#v}"
            if (( n > MAX )); then
              MAX="$n"
            fi
          done < <(git tag -l 'v[1-9]*' | grep -E '^v[1-9][0-9]*$' \
            | grep -v "^${TAG}$")

          CUR="${TAG#v}"
          if (( CUR <= MAX )); then
            echo "::error::Tag $TAG is not greater than existing" \
              "maximum v${MAX}"
            gh issue create \
              --title "Invalid version tag (not monotonic): $TAG" \
              --body "Der Tag \`$TAG\` ist ungültig, weil er nicht größer" \
              "ist als das aktuell größte existierende Tag (v${MAX}).

          Neue Tags müssen numerisch größer sein als das derzeit größte" \
              "\`vNNN\`. Lücken sind erlaubt.

          Details:
          - Geprüftes Tag: \`$TAG\`
          - Größtes bestehendes gültiges Tag: \`v${MAX}\`

          Bitte setze ein neues Tag mit einer größeren Nummer.

          @clavicarius"
            exit 1
          fi

          echo "Tag $TAG is valid (greater than v${MAX})."
